<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Simulador Leyes de Newton</title>

<style>

/* ESTILO GENERAL */

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(to right,#1e3c72,#2a5298);
    color:white;
    text-align:center;
    margin:0;
}

/* TÍTULO */

h1{
    margin-top:20px;
}

/* CONTENEDOR */

.contenedor{
    width:85%;
    margin:auto;
    background:rgba(255,255,255,0.1);
    padding:20px;
    border-radius:15px;
    margin-top:20px;
}

/* INPUTS */

input,select{
    padding:10px;
    margin:10px;
    border-radius:10px;
    border:none;
    width:170px;
    text-align:center;
}

/* BOTÓN */

button{
    padding:10px 20px;
    border:none;
    border-radius:10px;
    background:#00c6ff;
    color:white;
    cursor:pointer;
    transition:0.3s;
}

/* EFECTO BOTÓN */

button:hover{
    background:#0072ff;
    transform:scale(1.05);
}

/* RESULTADO */

#resultado{
    margin-top:20px;
    font-size:24px;
    font-weight:bold;
}

/* PROCEDIMIENTO */

#procedimiento{
    margin-top:15px;
    font-size:18px;
}

/* FRICCIÓN */

#estadoFriccion{
    margin-top:20px;
    font-size:22px;
    font-weight:bold;
    color:yellow;
}

/* ESCENA */

.escena{
    margin-top:30px;
    width:100%;
    height:220px;
    background:#dfefff;
    border-radius:15px;
    position:relative;
    overflow:hidden;
}

/* SUELO */

.suelo{
    position:absolute;
    bottom:0;
    width:100%;
    height:40px;
    background:#555;
}

/* CAJA */

.caja{
    position:absolute;
    width:80px;
    height:80px;
    background:crimson;
    bottom:40px;
    left:20px;
    border-radius:10px;

    transition:left 2s;

    display:flex;
    justify-content:center;
    align-items:center;

    font-weight:bold;
    color:white;
}

/* CANVAS */

#diagrama{
    background:white;
    border-radius:15px;
    margin-top:40px;
}

</style>
</head>

<body>

<h1>Simulador de Leyes de Newton</h1>

<div class="contenedor">

<h2>¿Qué deseas calcular?</h2>

<select id="tipo">

    <option value="fuerza">
        Fuerza (F)
    </option>

    <option value="aceleracion">
        Aceleración (a)
    </option>

    <option value="masa">
        Masa (m)
    </option>

</select>

<br>

<input
type="number"
id="masa"
placeholder="Masa (kg)">

<input
type="number"
id="aceleracion"
placeholder="Aceleración (m/s²)">

<input
type="number"
id="fuerza"
placeholder="Fuerza (N)">

<input
type="number"
id="friccion"
placeholder="Coeficiente fricción">

<br><br>

<button onclick="resolver()">
Resolver
</button>

<div id="resultado"></div>

<div id="procedimiento"></div>

<div id="estadoFriccion"></div>

<!-- ESCENA -->

<div class="escena">

    <div class="caja" id="caja">
        Caja
    </div>

    <div class="suelo"></div>

</div>

<!-- DIAGRAMA -->

<canvas
id="diagrama"
width="600"
height="350">
</canvas>

</div>

<script>

/* MOVER OBJETO */

function moverObjeto(fuerzaNeta){

    let caja =
    document.getElementById("caja");

    let distancia =
    fuerzaNeta * 8;

    if(distancia < 0){
        distancia = 0;
    }

    if(distancia > 950){
        distancia = 950;
    }

    caja.style.left =
    distancia + "px";
}

/* MOSTRAR FRICCIÓN */

function mostrarFriccion(mu){

    let estado =
    document.getElementById("estadoFriccion");

    if(mu > 0){

        estado.innerHTML =
        "⚠ Hay fricción en la superficie";

    }else{

        estado.innerHTML =
        "No hay fricción";
    }
}

/* DIAGRAMA */

function dibujarDiagrama(
    fuerza,
    friccion,
    masa
){

    let canvas =
    document.getElementById("diagrama");

    let ctx =
    canvas.getContext("2d");

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    ctx.fillStyle = "white";

    ctx.fillRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    /* CAJA */

    ctx.fillStyle = "crimson";

    ctx.fillRect(
        250,
        120,
        100,
        100
    );

    ctx.font = "20px Arial";

    ctx.fillStyle = "black";

    ctx.fillText(
        masa.toFixed(1) + " kg",
        270,
        175
    );

    /* NORMAL */

    ctx.beginPath();

    ctx.moveTo(300,120);

    ctx.lineTo(300,40);

    ctx.stroke();

    ctx.beginPath();

    ctx.moveTo(300,40);

    ctx.lineTo(290,55);

    ctx.lineTo(310,55);

    ctx.fill();

    ctx.fillText(
        "Normal",
        320,
        55
    );

    /* PESO */

    ctx.beginPath();

    ctx.moveTo(300,220);

    ctx.lineTo(300,310);

    ctx.stroke();

    ctx.beginPath();

    ctx.moveTo(300,310);

    ctx.lineTo(290,295);

    ctx.lineTo(310,295);

    ctx.fill();

    ctx.fillText(
        "Peso",
        320,
        300
    );

    /* FUERZA */

    ctx.beginPath();

    ctx.moveTo(350,170);

    ctx.lineTo(500,170);

    ctx.stroke();

    ctx.beginPath();

    ctx.moveTo(500,170);

    ctx.lineTo(485,160);

    ctx.lineTo(485,180);

    ctx.fill();

    ctx.fillText(
        "F = " +
        fuerza.toFixed(1) +
        " N",
        390,
        150
    );

    /* FRICCIÓN */

    ctx.beginPath();

    ctx.moveTo(250,170);

    ctx.lineTo(100,170);

    ctx.stroke();

    ctx.beginPath();

    ctx.moveTo(100,170);

    ctx.lineTo(115,160);

    ctx.lineTo(115,180);

    ctx.fill();

    ctx.fillText(
        "Ff = " +
        friccion.toFixed(1) +
        " N",
        20,
        150
    );
}

/* FUNCIÓN PRINCIPAL */

function resolver(){

    let tipo =
    document.getElementById("tipo").value;

    let m =
    parseFloat(
        document.getElementById("masa").value
    );

    let a =
    parseFloat(
        document.getElementById("aceleracion").value
    );

    let f =
    parseFloat(
        document.getElementById("fuerza").value
    );

    let mu =
    parseFloat(
        document.getElementById("friccion").value
    ) || 0;

    let resultado =
    document.getElementById("resultado");

    let proc =
    document.getElementById("procedimiento");

    resultado.innerHTML = "";
    proc.innerHTML = "";

    mostrarFriccion(mu);

    /* CALCULAR ACELERACIÓN */

    if(tipo === "aceleracion"){

        if(isNaN(f) || isNaN(m)){

            resultado.innerHTML =
            "Ingrese fuerza y masa";

            return;
        }

        let fuerzaFriccion =
        mu * m * 9.8;

        let fuerzaNeta =
        f - fuerzaFriccion;

        if(fuerzaNeta <= 0){

            resultado.innerHTML =
            "No hay movimiento";

            moverObjeto(0);

            dibujarDiagrama(
                f,
                fuerzaFriccion,
                m
            );

            return;
        }

        let aceleracion =
        fuerzaNeta / m;

        resultado.innerHTML =
        "Aceleración = " +
        aceleracion.toFixed(2) +
        " m/s²";

        proc.innerHTML =

        "Fricción = μ × m × g = " +
        fuerzaFriccion.toFixed(2) +
        " N<br><br>" +

        "Fn = F - Ff = " +
        fuerzaNeta.toFixed(2) +
        " N<br><br>" +

        "a = Fn / m = " +
        aceleracion.toFixed(2);

        moverObjeto(fuerzaNeta);

        dibujarDiagrama(
            f,
            fuerzaFriccion,
            m
        );
    }

    /* CALCULAR FUERZA */

    if(tipo === "fuerza"){

        if(isNaN(m) || isNaN(a)){

            resultado.innerHTML =
            "Ingrese masa y aceleración";

            return;
        }

        let fuerzaBase =
        m * a;

        let fuerzaFriccion =
        mu * m * 9.8;

        let fuerzaTotal =
        fuerzaBase + fuerzaFriccion;

        resultado.innerHTML =
        "Fuerza = " +
        fuerzaTotal.toFixed(2) +
        " N";

        proc.innerHTML =

        "F = m × a<br><br>" +

        "F = " + m +
        " × " + a +
        "<br><br>" +

        "Fuerza base = " +
        fuerzaBase.toFixed(2) +
        " N<br><br>" +

        "Fricción = μ × m × g = " +
        fuerzaFriccion.toFixed(2) +
        " N<br><br>" +

        "F total = " +
        fuerzaBase.toFixed(2) +
        " + " +
        fuerzaFriccion.toFixed(2) +
        "<br><br>" +

        "F = " +
        fuerzaTotal.toFixed(2) +
        " N";

        moverObjeto(fuerzaTotal);

        dibujarDiagrama(
            fuerzaTotal,
            fuerzaFriccion,
            m
        );
    }

    /* CALCULAR MASA */

    if(tipo === "masa"){

        if(isNaN(f) || isNaN(a)){

            resultado.innerHTML =
            "Ingrese fuerza y aceleración";

            return;
        }

        if(a === 0){

            resultado.innerHTML =
            "La aceleración no puede ser 0";

            return;
        }

        let masa =
        f / a;

        let fuerzaFriccion =
        mu * masa * 9.8;

        resultado.innerHTML =
        "Masa = " +
        masa.toFixed(2) +
        " kg";

        proc.innerHTML =

        "m = F / a<br><br>" +

        "m = " + f +
        " / " + a +
        "<br><br>" +

        "m = " +
        masa.toFixed(2) +
        " kg<br><br>" +

        "Fricción = μ × m × g = " +
        fuerzaFriccion.toFixed(2) +
        " N";

        moverObjeto(f);

        dibujarDiagrama(
            f,
            fuerzaFriccion,
            masa
        );
    }
}

</script>

</body>
</html>
